<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Ma Pomme de Terre</title>
        <link rel="stylesheet" href="style.css">
    </head>
    <body>
        <header>
            <h1>Ma Pomme de Terre</h1>
            <button id="tray-toggle">⚙️ Settings & Nav</button>
            <div id="filter-tray">
                <div id="tray-tabs">
                    <button class="tab-btn active" data-tab="tab-level">Level</button>
                    <button class="tab-btn" data-tab="tab-category">Category</button>
                    <button class="tab-btn" data-tab="tab-topic">Topic</button>
                </div>              
                <section id="tab-level" class="tab-content active">
                    <div id="level-list" class="action-list">        
                    </div>
                    <hr>
                    <label class="toggle-container">
                        <input type="checkbox" id="level-inclusive-toggle">
                        Include prior levels
                    </label>
                </section>
                <section id="tab-category" class="tab-content">
                    <div id="category-list" class="action-list">        
                    </div>
                </section>
                <section id="tab-topic" class="tab-content">
                    <div id="jump-nav-container" class="action-list">        
                    </div>
                </section>
            </div>
        </header>
        <main id="app">
            <div id="loading">Chargement...</div>
        </main>
        <script type="module" src="app.js"></script>
    </body>
</html>
